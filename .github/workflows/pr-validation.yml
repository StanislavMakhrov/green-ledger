name: PR Validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  packages: write

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Guardrail: internal/workflow PRs must not bump versions"
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          if [ -z "$changed_files" ]; then
            echo "No changed files detected; skipping internal commit guardrail."
            exit 0
          fi

          # If anything outside these paths changed, this is not an internal-only PR.
          non_internal=$(echo "$changed_files" | grep -Ev '^(\.github/|scripts/|docs/)' || true)
          if [ -n "$non_internal" ]; then
            echo "Non-internal files changed; internal commit guardrail not applicable."
            exit 0
          fi

          echo "Internal-only PR detected; enforcing non-version-bumping commit types."

          # Versionize bumps on conventional commits like feat/fix (and breaking changes).
          messages=$(git log --format=%B "$BASE_SHA".."$HEAD_SHA" || true)

          if echo "$messages" | grep -Eqi '^(feat|fix|perf)(\([^)]*\))?:|BREAKING CHANGE:'; then
            echo "❌ ERROR: This PR only changes internal/workflow/tooling files, but includes version-bumping commits (feat/fix/perf or BREAKING CHANGE)."
            echo "Please use non-bumping types like chore:, ci:, docs:, style:, refactor: for internal changes."
            exit 1
          fi

          echo "✓ Commit messages OK for internal-only PR."

      - name: Check if validation is needed
        id: filter
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "No changed files detected; running validation"
            exit 0
          fi

          NON_IGNORED=$(echo "$CHANGED_FILES" | grep -Ev '^(docs/|\.github/agents/|\.github/skills/|\.github/copilot-instructions\.md$|\.github/gh-cli-instructions\.md$|\.github/pull_request_template\.md$)' || true)

          if [ -z "$NON_IGNORED" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Only docs/agent-instructions changed; skipping validation"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Non-ignored files changed; running validation"
          fi

      - name: Setup Node.js
        if: steps.filter.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: ${{ hashFiles('src/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        if: steps.filter.outputs.changed == 'true'
        working-directory: src
        run: npm ci

      - name: Generate Prisma client
        if: steps.filter.outputs.changed == 'true'
        working-directory: src
        run: npx prisma generate

      - name: Lint
        if: steps.filter.outputs.changed == 'true'
        working-directory: src
        run: npm run lint

      - name: Type check
        if: steps.filter.outputs.changed == 'true'
        working-directory: src
        run: npm run type-check

      - name: Test
        if: steps.filter.outputs.changed == 'true'
        working-directory: src
        run: npm test

      - name: Build
        if: steps.filter.outputs.changed == 'true'
        working-directory: src
        run: npm run build

      - name: Skip validation (no relevant files changed)
        if: steps.filter.outputs.changed == 'false'
        run: echo "✅ PR validation skipped (docs/agent-only changes)"

  docker:
    name: Build & Push Docker Image for UAT
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      dockerfile_exists: ${{ steps.dockerfile_check.outputs.exists }}
      image: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for Dockerfile
        id: dockerfile_check
        run: |
          if [ -f "src/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No Dockerfile found — skipping Docker build."
          fi

      - name: Set up Docker Buildx
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name and short SHA
        id: repo
        run: |
          echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./src
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:pr-${{ github.event.pull_request.number }}-${{ steps.repo.outputs.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}:pr-${{ github.event.pull_request.number }}

      - name: Export image tag
        id: image
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: |
          echo "tag=ghcr.io/${{ steps.repo.outputs.name }}:pr-${{ github.event.pull_request.number }}-${{ steps.repo.outputs.sha }}" >> $GITHUB_OUTPUT

      - name: UAT instructions
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: |
          IMAGE="ghcr.io/${{ steps.repo.outputs.name }}:pr-${{ github.event.pull_request.number }}-${{ steps.repo.outputs.sha }}"
          {
            echo "## 🐳 UAT — Docker image ready"
            echo ""
            echo "Pull and run the image to verify this PR locally:"
            echo ""
            echo '```bash'
            echo "docker pull ${IMAGE}"
            echo "docker run --rm -p 3000:3000 ${IMAGE}"
            echo '```'
            echo ""
            echo "Then open **http://localhost:3000** in your browser."
            echo ""
            echo "> The seed runs automatically on first start — demo data is pre-loaded."
            echo "> The tag includes the commit SHA to ensure Docker always pulls the latest image."
          } | tee -a "$GITHUB_STEP_SUMMARY"

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: docker
    if: needs.docker.outputs.dockerfile_exists == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and start Docker image
        run: |
          IMAGE="${{ needs.docker.outputs.image }}"
          docker pull "${IMAGE}"
          docker run --rm -d -p 3000:3000 --name greenledger-smoke "${IMAGE}"

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app on http://localhost:3000 ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "✅ App is ready (attempt ${i})"
              exit 0
            fi
            echo "  attempt ${i}/30 — not ready yet, sleeping 3s"
            sleep 3
          done
          echo "❌ App did not become ready in time"
          docker logs greenledger-smoke || true
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: ${{ hashFiles('src/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        working-directory: src
        run: npm ci

      - name: Generate Prisma client
        working-directory: src
        run: npx prisma generate

      - name: Run smoke tests
        working-directory: src
        env:
          BASE_URL: http://localhost:3000
        run: npm run test:smoke

      - name: Stop Docker container
        if: always()
        run: docker stop greenledger-smoke || true
