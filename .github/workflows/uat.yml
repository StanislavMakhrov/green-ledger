name: UAT Docker Build

# UAT Docker builds are now automated in PR Validation (pr-validation.yml).
# After every PR push, the Docker image is built and pushed to GHCR:
#
#   docker pull ghcr.io/stanislavmakhrov/green-ledger:pr-<number>
#   docker run --rm -p 3000:3000 ghcr.io/stanislavmakhrov/green-ledger:pr-<number>
#
# This workflow is kept as a manual fallback for ad-hoc branch builds.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and push (defaults to the branch this workflow is run from)'
        required: false
        default: ''

concurrency:
  group: uat-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  uat-build:
    name: Build & Push Docker Image for UAT
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Check for Dockerfile
        id: dockerfile_check
        run: |
          if [ -f "src/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Dockerfile found at src/Dockerfile"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  No Dockerfile found at src/Dockerfile — skipping Docker build."
          fi

      - name: Set up Docker Buildx
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./src
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: UAT instructions
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          echo "✅ Docker image pushed: ${IMAGE}"
          echo ""
          echo "Pull and run:"
          echo "  docker pull ${IMAGE}"
          echo "  docker run --rm -p 3000:3000 ${IMAGE}"
          echo ""
          echo "Then open http://localhost:3000"
