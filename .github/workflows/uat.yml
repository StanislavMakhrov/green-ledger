name: UAT Docker Build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (defaults to the branch this workflow is run from)'
        required: false
        default: ''

concurrency:
  group: uat-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  uat-build:
    name: Build Docker Image for UAT
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Check for Dockerfile
        id: dockerfile_check
        run: |
          if [ -f "src/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Dockerfile found at src/Dockerfile"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  No Dockerfile found at src/Dockerfile — skipping Docker build."
            echo "The Dockerfile is created per feature. Re-run this workflow after the feature branch adds it."
          fi

      - name: Set up Docker Buildx
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.dockerfile_check.outputs.exists == 'true'
        run: docker compose build

      - name: Report result
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          if [ "${{ steps.dockerfile_check.outputs.exists }}" = "true" ]; then
            echo "✅ Docker image built successfully. Ready for UAT."
            echo ""
            echo "To run the app locally for UAT testing:"
            echo ""
            echo "  git fetch origin && git checkout ${BRANCH}"
            echo "  docker compose up"
            echo ""
            echo "Then open http://localhost:3000"

            {
              echo "## ✅ Docker image built successfully"
              echo ""
              echo "**Branch:** \`${BRANCH}\`"
              echo ""
              echo "### Run locally for UAT testing"
              echo ""
              echo '```bash'
              echo "git fetch origin && git checkout ${BRANCH}"
              echo "docker compose up"
              echo '```'
              echo ""
              echo "Then open [http://localhost:3000](http://localhost:3000)"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️  No Dockerfile present on this branch yet. UAT Docker build skipped."
            echo "Add a Dockerfile at src/Dockerfile to enable UAT builds."

            {
              echo "## ℹ️ UAT Docker build skipped"
              echo ""
              echo "No Dockerfile present on this branch yet."
              echo "Add a Dockerfile at \`src/Dockerfile\` to enable UAT builds."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
