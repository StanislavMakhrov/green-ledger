version: '3.8'
services:
  app:
    build:
      context: src
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - greenledger-data:/data
    environment:
      - DATABASE_URL=file:/data/greenledger.db
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  greenledger-data:
